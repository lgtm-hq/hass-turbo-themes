---
ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/actions/**'
          - 'scripts/ci/**'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - 'README.md'
          - 'CHANGELOG.md'
          - '**/*.md'
          - '!.github/**/*.md'

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'pyproject.toml'
          - 'uv.lock'
          - 'renovate.json'

maintenance:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/CODEOWNERS'
          - '.github/labeler.yml'
          - 'AGENTS.md'

security:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/*security*.yml'
          - '.github/workflows/*codeql*.yml'
          - '.github/workflows/sbom*.yml'
          - 'SECURITY.md'

themes:
  - changed-files:
      - any-glob-to-any-file:
          - 'themes/**'

scripts:
  - changed-files:
      - any-glob-to-any-file:
          - 'scripts/**'
