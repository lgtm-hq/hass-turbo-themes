---
name: Security - CodeQL Code Scanning

"on":
  push:
    branches: [main]
    paths: ['.github/**']
  pull_request:
    branches: [main]
    # No paths filter: `codeql / 🔬 CodeQL Analysis` is a required status
    # check, and a path-filtered workflow that does not run leaves that context
    # absent, which blocks PRs and merge-queue entries.
  merge_group:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  codeql:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-codeql.yml@443a687caa93b3afa306a066aae8d8a2b4e60c3c  # v0.59.0
    with:
      # Org ruleset (checks-hass-turbo-themes): codeql / 🔬 CodeQL Analysis
      job-name: '🔬 CodeQL Analysis'
      languages: actions
      build-mode: none
      category: '/language:all'
      tooling-ref: '443a687caa93b3afa306a066aae8d8a2b4e60c3c'  # v0.59.0
      egress-policy: block
      egress-preset: github-tooling
      allowed-endpoints-mode: replace
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        uploads.github.com:443
        pipelines.actions.githubusercontent.com:443
        release-assets.githubusercontent.com:443
    permissions:
      # read: checkout repository for CodeQL analysis
      contents: read
      # write: upload CodeQL findings to the Security tab
      security-events: write
