# SPDX-License-Identifier: MIT
---
name: "🏷️ Release - Auto Tag"

"on":
  push:
    branches: [main]
    paths:
      - "CHANGELOG.md"
  workflow_dispatch:
    inputs:
      version:
        description: "The version to tag, for example 1.0.0"
        required: true
        type: string

permissions: {}

concurrency:
  group: release-auto-tag-${{ github.repository }}
  cancel-in-progress: false

jobs:
  auto-tag:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-release-auto-tag.yml@443a687caa93b3afa306a066aae8d8a2b4e60c3c  # v0.59.0
    with:
      # yamllint disable-line rule:line-length
      version: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
      tag-prefix: v
      create-release: true
      tooling-ref: "443a687caa93b3afa306a066aae8d8a2b4e60c3c"  # v0.59.0
      egress-policy: block
      egress-preset: github-tooling
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
    permissions:
      actions: read
      contents: write
      issues: write
