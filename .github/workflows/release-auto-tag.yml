# SPDX-License-Identifier: MIT
---
name: "🏷️ Release - Auto Tag"

"on":
  push:
    branches: [main]
    paths:
      - "CHANGELOG.md"
  workflow_dispatch:
    inputs:
      version:
        description: "The version to tag, for example 1.0.0"
        required: true
        type: string

permissions: {}

concurrency:
  group: release-auto-tag-${{ github.repository }}
  cancel-in-progress: false

jobs:
  auto-tag:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-release-auto-tag.yml@f50044aac41cee98865e6c74b038be72792e5a56
    with:
      version: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
      tag-prefix: v
      create-release: true
      tooling-ref: "f50044aac41cee98865e6c74b038be72792e5a56"
      egress-policy: block
      egress-preset: github-tooling
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
    permissions:
      actions: read
      contents: write
      issues: write
