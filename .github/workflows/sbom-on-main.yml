---
name: Security - SBOM Generation

"on":
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: sbom-main-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  sbom:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-sbom.yml@443a687caa93b3afa306a066aae8d8a2b4e60c3c  # v0.59.0
    with:
      target: .
      target-type: dir
      sbom-format: cyclonedx-json
      scan-vulnerabilities: true
      create-attestation: true
      tooling-ref: '443a687caa93b3afa306a066aae8d8a2b4e60c3c'  # v0.59.0
      egress-policy: block
      egress-preset: sbom
    permissions:
      # write: attach SBOM to release assets; also covers repository checkout
      contents: write
      # write: upload vulnerability findings to the Security tab
      security-events: write
      # write: OIDC token for SBOM attestation signing
      id-token: write
      # write: publish SBOM attestations
      attestations: write
