---
name: Maintenance - Renovate Dependencies
# Automated dependency updates using Renovate bot.

"on":
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      # write: Renovate pushes update branches and commits
      contents: write
      # write: Renovate opens dependency dashboard issues
      issues: write
      # write: Renovate creates and updates dependency PRs
      pull-requests: write
    concurrency:
      group: renovate-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443 api.github.com:443 codeload.github.com:443
            ghcr.io:443 pkg-containers.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443 pypi.org:443 files.pythonhosted.org:443

      - name: Checkout
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Self-hosted Renovate
        # yamllint disable-line rule:line-length
        uses: renovatebot/github-action@22e0a16091fc706b04affe6ae53d5e3358ac4023  # v46.1.19
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          configurationFile: renovate.json
        env:
          LOG_LEVEL:
            ${{ github.event_name == 'workflow_dispatch' && 'debug' || 'info' }}
