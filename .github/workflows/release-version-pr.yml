# SPDX-License-Identifier: MIT
---
name: "📝 Release - Version PR"

"on":
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-version-pr-${{ github.repository }}
  cancel-in-progress: false

jobs:
  version-pr:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-release-version-pr.yml@443a687caa93b3afa306a066aae8d8a2b4e60c3c  # v0.59.0
    with:
      max-bump: major
      tooling-ref: "443a687caa93b3afa306a066aae8d8a2b4e60c3c"  # v0.59.0
      egress-policy: block
      egress-preset: github-tooling
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write
