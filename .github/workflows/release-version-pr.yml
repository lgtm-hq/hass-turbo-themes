# SPDX-License-Identifier: MIT
---
name: "📝 Release - Version PR"

"on":
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-version-pr-${{ github.repository }}
  cancel-in-progress: false

jobs:
  version-pr:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-release-version-pr.yml@f50044aac41cee98865e6c74b038be72792e5a56
    with:
      max-bump: major
      tooling-ref: "f50044aac41cee98865e6c74b038be72792e5a56"
      egress-policy: block
      egress-preset: github-tooling
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write
