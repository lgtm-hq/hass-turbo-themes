---
# Lintro is the master configuration source for formatting and quality checks.
# Full tool catalog enabled; tools with no matching sources no-op.

enforce:
  line_length: 88

execution:
  tool_order: priority
  fail_fast: false
  parallel: true
  auto_install_deps: true
  exclude:
    - '.lintro/**'
    - '.venv/**'
    - 'node_modules/**'

defaults:
  prettier:
    semi: true
    singleQuote: true
    tabWidth: 2
    printWidth: 88
    trailingComma: es5
    overrides:
      - files: '*.md'
        options:
          printWidth: 88

  # markdownlint rule options live in .markdownlint.json — lintro does not
  # forward nested rule options (lgtm-hq/py-lintro issue pending)

  yamllint:
    extends: default
    rules:
      comments-indentation: disable
      comments:
        min-spaces-from-content: 1
      truthy:
        check-keys: true
      line-length:
        max: 88
        allow-non-breakable-inline-mappings: true

  shellcheck:
    severity: warning

tools:
  actionlint:
    enabled: true
  # tsc needs node_modules, which the quality container never installs
  # (lgtm-ci#657); type-checking runs via bunx tsc in regen-themes.yml instead.
  tsc:
    enabled: false
  gitleaks:
    enabled: true
  markdownlint:
    enabled: true
  mypy:
    enabled: true
  osv_scanner:
    enabled: true
  prettier:
    enabled: true
  ruff:
    enabled: true
  semgrep:
    enabled: true
  shellcheck:
    enabled: true
  shfmt:
    enabled: true
  yamllint:
    enabled: true

ai:
  enabled: false
